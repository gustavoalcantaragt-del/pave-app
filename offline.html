<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAVE — Sem Conexão</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Antonio:wght@700;800&family=Montserrat:wght@400;500;600;700&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', system-ui, sans-serif;
            background: #f4f5f7;
            color: #181818;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            background: #fafafa;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(24,24,24,0.09);
        }
        .icon {
            width: 72px; height: 72px;
            background: rgba(47,156,119,0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
        }
        h1 {
            font-family: 'Antonio', 'Montserrat', sans-serif;
            font-size: 1.75rem; font-weight: 800;
            color: #234e70;
            margin-bottom: 0.75rem;
            letter-spacing: -0.3px;
        }
        p { color: #4a5568; font-size: 0.92rem; line-height: 1.6; margin-bottom: 1.5rem; }
        .btn {
            display: inline-block;
            background: #234e70;
            color: #fff;
            padding: 0.75rem 1.75rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn:hover { background: #1a3a54; }
        .badge {
            display: inline-block;
            margin-top: 1.25rem;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #2f9c77;
            background: rgba(47,156,119,0.08);
            padding: 4px 10px;
            border-radius: 99px;
            border: 1px solid rgba(47,156,119,0.2);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2f9c77" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="1" y1="1" x2="23" y2="23"/>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
                <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                <line x1="12" y1="20" x2="12.01" y2="20"/>
            </svg>
        </div>
        <h1>Sem Conexão</h1>
        <p>Você está offline. Verifique sua conexão com a internet e tente novamente.</p>
        <p>Os dados já sincronizados ficam disponíveis localmente enquanto você aguarda a reconexão.</p>
        <button class="btn" onclick="window.location.reload()">Tentar Novamente</button>
        <div class="badge">PAVE — Modo Offline</div>
    </div>
</body>
</html>
